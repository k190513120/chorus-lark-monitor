<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>群聊监控 · Chorus</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/v2-styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- 1) 实时数据（FastAPI 动态生成）：window.AppData -->
  <script type="text/babel" src="src/data.jsx"></script>

  <!-- 2) AppData → MOCK 适配器：构建 design 期望的形状 -->
  <script type="text/babel" src="src/v2-data-adapter.js"></script>

  <!-- 3) Tweaks 面板（runtime 主题/视图开关） -->
  <script type="text/babel" src="src/v2-tweaks-panel.jsx"></script>

  <!-- 4) 设计组件 + 视图（DR 视角 / 告警优先 / 全局总览） -->
  <script type="text/babel" src="src/v2-components.jsx"></script>
  <script type="text/babel" src="src/v2-views.jsx"></script>

  <!-- 5) broadcast tab 的依赖 -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/broadcast.jsx"></script>

  <!-- 6) 顶层 App，串起所有 -->
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
