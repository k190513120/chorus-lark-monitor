name: Daily Feishu Sync

on:
  schedule:
    # 北京时间 10:00 = UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_chats:
        description: '最多同步多少个群（默认 0 = 不限制，覆盖应用机器人所在全部群；注意 Actions 单 job 6h 上限）'
        required: false
        default: '0'
      smoke_test:
        description: '只读测试：列出群并抽样读取成员/消息，不写 Base、不部署'
        required: false
        default: 'false'
      smoke_test_detail_chats:
        description: '只读测试抽样读取多少个群'
        required: false
        default: '5'

permissions:
  contents: write

concurrency:
  group: daily-feishu-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily sync
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          MAX_CHATS: ${{ github.event.inputs.max_chats || '0' }}
          SMOKE_TEST: ${{ github.event.inputs.smoke_test || 'false' }}
          SMOKE_TEST_DETAIL_CHATS: ${{ github.event.inputs.smoke_test_detail_chats || '5' }}
          SYNC_TIMEZONE: Asia/Shanghai
        run: |
          EXTRA_ARGS=""
          if [ -n "$MAX_CHATS" ] && [ "$MAX_CHATS" != "0" ]; then
            EXTRA_ARGS="--max-chats $MAX_CHATS"
          fi
          if [ "$SMOKE_TEST" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --smoke-test --smoke-test-detail-chats $SMOKE_TEST_DETAIL_CHATS"
          fi
          echo "Running with: $EXTRA_ARGS"
          ./run_daily_sync.sh $EXTRA_ARGS

      - name: Regenerate frontend data.jsx
        if: ${{ github.event.inputs.smoke_test != 'true' }}
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          WEB_MAX_GROUPS: ${{ vars.WEB_MAX_GROUPS || '0' }}
          WEB_MAX_MESSAGES_PER_GROUP: ${{ vars.WEB_MAX_MESSAGES_PER_GROUP || '0' }}
          SYNC_TIMEZONE: Asia/Shanghai
        run: python3 export_to_web.py

      - name: Commit state and data.jsx
        if: ${{ github.event.inputs.smoke_test != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .sync_state.json web/src/data.jsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: ${{ github.event.inputs.smoke_test != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@latest pages deploy web --project-name=chorus-lark-monitor --branch=main --commit-dirty=true
